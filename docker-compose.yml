version: '3.8'

services:
  proof-server:
    image: midnightntwrk/proof-server:8.1.0
    container_name: midnight-proof-server
    command: ["midnight-proof-server", "-v"]
    ports:
      - "6300:6300"
    environment:
      RUST_BACKTRACE: "full"
    volumes:
      - ./zk-params:/.cache/midnight
